# Pinned tmux config for scenario captures.
#
# Kept minimal + deterministic so scenario shell scripts produce the
# same visual output across machines. The sidebar itself loads its
# own pane options and does not care about these settings; they are
# mostly for the tmux status bar + pane borders that the `capture`
# subcommand reads back.

set  -g default-terminal   "tmux-256color"
set  -g base-index          0
setw -g pane-base-index     0

set  -g status-bg          "#1a1b26"
set  -g status-fg          "#c0caf5"
set  -g status-left        "[#S] "
set  -g status-right       "%H:%M "
set  -g status-interval    60

set  -g pane-border-style        "fg=#414868"
set  -g pane-active-border-style "fg=#7aa2f7"
